<!DOCTYPE html>
<html lang="es">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Comercial - Málaga</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg-deep: #0a0e14;
        --bg-card: #141b26;
        --corporate-blue: #0056b3; 
        --soft-blue: #3a86ff;
        --success-green: #22c55e;
        --text-main: #ffffff;
        --text-dim: #94a3b8;
        --border: #2d3748;
    }

    body {
        font-family: 'Outfit', sans-serif;
        background-color: var(--bg-deep);
        color: var(--text-main);
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .dashboard-container {
        display: grid;
        grid-template-columns: 1.2fr 2.5fr 1.3fr;
        gap: 20px;
        padding: 25px;
        flex-grow: 1;
        height: calc(100vh - 50px);
    }

    .card {
        background: var(--bg-card);
        border-radius: 20px;
        padding: 30px;
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .title-section {
        font-size: 0.9rem;
        font-weight: 800;
        color: var(--soft-blue);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
    }

    .goal-reached .team-val, .goal-reached .big-number, .goal-reached .main-title {
        color: var(--success-green) !important;
        -webkit-text-fill-color: var(--success-green) !important;
    }

    .goal-reached .progress-fill {
        background: var(--success-green) !important;
        box-shadow: 0 0 25px rgba(34, 197, 94, 0.5) !important;
    }

    #ranking-list { overflow-y: auto; }
    .ranking-item {
        display: flex;
        justify-content: space-between;
        padding: 12px 15px;
        background: rgba(255,255,255,0.03);
        border-radius: 10px;
        margin-bottom: 8px;
    }
    .ranking-item:first-child { border: 1px solid var(--corporate-blue); background: rgba(0, 86, 179, 0.2); }

    .center-card { justify-content: center; align-items: center; text-align: center; }
    .main-title { font-size: 3rem; font-weight: 800; margin: 0; }
    .big-number { font-size: 14rem; font-weight: 900; line-height: 0.8; margin: 20px 0; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .progress-bg { background: #0a0e14; height: 30px; border-radius: 15px; overflow: hidden; width: 100%; margin: 15px 0; border: 1px solid var(--border); }
    .progress-fill { background: linear-gradient(90deg, var(--corporate-blue), var(--soft-blue)); height: 100%; width: 0%; transition: width 2s ease; }

    .goal-display { margin-top: 10px; padding: 10px 30px; background: rgba(58, 134, 255, 0.1); border-radius: 15px; border: 2px dashed var(--soft-blue); }
    .goal-value { font-size: 3rem; font-weight: 900; margin-left: 10px; }

    .team-unit { margin-bottom: 20px; text-align: center; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 15px; }
    .team-val { font-size: 5rem; font-weight: 900; line-height: 1; }
    .team-meta { color: var(--soft-blue); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="card">
        <div class="title-section">Ranking Agentes</div>
        <div id="ranking-list"></div>
    </div>

    <div id="container-total" class="card center-card">
        <img src="banner Selectra.jpg" alt="Banner" style="width: 100%; border-radius: 15px; margin-bottom: 20px; max-height: 300px; max-width: 300px">
        <h1 class="main-title">MÁLAGA TOTAL</h1>
        <div class="big-number" id="total-val">0</div>
        
        <div style="width: 80%;">
            <div style="display: flex; justify-content: space-between; font-weight: 800;">
                <span style="color: var(--text-dim);">PROGRESO</span>
                <span id="percent-total" style="color: var(--soft-blue);">0%</span>
            </div>
            <div class="progress-bg">
                <div id="bar-total" class="progress-fill"></div>
            </div>
            <div class="goal-display">
                <span>OBJETIVO:</span>
                <span class="goal-value" id="goal-total">0</span>
            </div>
        </div>
    </div>

    <div class="card" style="justify-content: center;">
        <div class="title-section">Equipos</div>
        <div id="unit-m1" class="team-unit">
            <span style="font-weight: 800;">EQUIPO M1</span>
            <div class="team-val" id="m1-val">0</div>
            <div class="progress-bg" style="height: 10px;"><div id="bar-m1" class="progress-fill"></div></div>
            <div class="team-meta">META: <span id="goal-m1">0</span></div>
        </div>
        <div id="unit-m3" class="team-unit">
            <span style="font-weight: 800;">EQUIPO M3</span>
            <div class="team-val" id="m3-val">0</div>
            <div class="progress-bg" style="height: 10px;"><div id="bar-m3" class="progress-fill"></div></div>
            <div class="team-meta">META: <span id="goal-m3">0</span></div>
        </div>
    </div>
</div>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbzrY52wAmDBPVPr3mLHHZ5M_S0N6nWoSxBwCS6-YwilMhLFbBHuLtO63_oDNOsiN5TiwA/exec'; 

async function updateDashboard() {
    try {
        const response = await fetch(scriptURL);
        const data = await response.json();
        
        // 1. Ranking
        let rankingHtml = '';
        data.comerciales.sort((a,b) => b.valor - a.valor).forEach((c, i) => {
            if(c.valor > 0) {
                rankingHtml += `<div class="ranking-item"><span>#${i+1} ${c.nombre}</span><b>${c.valor}</b></div>`;
            }
        });
        document.getElementById('ranking-list').innerHTML = rankingHtml;

        // 2. Total
        const total = parseInt(data.total) || 0;
        const goalT = parseInt(data.objetivoTotal) || 1;
        document.getElementById('total-val').innerText = total;
        document.getElementById('goal-total').innerText = goalT;
        let pTotal = Math.min((total/goalT)*100, 100);
        document.getElementById('bar-total').style.width = pTotal + '%';
        document.getElementById('percent-total').innerText = Math.round(pTotal) + '%';
        if (total >= goalT) document.getElementById('container-total').classList.add('goal-reached');

        // 3. Equipos
        // M1
        const vM1 = parseInt(data.m1.valor) || 0;
        const gM1 = parseInt(data.m1.objetivo) || 1;
        document.getElementById('m1-val').innerText = vM1;
        document.getElementById('goal-m1').innerText = gM1;
        document.getElementById('bar-m1').style.width = (vM1/gM1*100) + '%';
        if (vM1 >= gM1) document.getElementById('unit-m1').classList.add('goal-reached');

        // M3
        const vM3 = parseInt(data.m3.valor) || 0;
        const gM3 = parseInt(data.m3.objetivo) || 1;
        document.getElementById('m3-val').innerText = vM3;
        document.getElementById('goal-m3').innerText = gM3;
        document.getElementById('bar-m3').style.width = (vM3/gM3*100) + '%';
        if (vM3 >= gM3) document.getElementById('unit-m3').classList.add('goal-reached');

    } catch (e) { console.error("Error:", e); }
}

setInterval(updateDashboard, 30000);
updateDashboard();
</script>
</body>
</html>
